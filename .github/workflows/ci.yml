name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: >
          cargo test --
          --skip cargo_test_generates_default_visual_artifacts
          --skip batch_execution_expands_outputs_and_artifacts
          --skip single_file_execution_writes_output_and_debug_artifact
          --skip url_execution_downloads_image_and_writes_output
          --skip url_default_output_refuses_to_overwrite_existing_file
          --skip webp_file_output_is_written_with_lossless_encoder
          --skip batch_rejects_same_input_and_output_directory

      - name: Build release binary
        run: cargo build --release --bin fixpix
