name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: fixpix-linux-x86_64.tar.gz
            binary: fixpix
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: fixpix-linux-x86_64-musl.tar.gz
            binary: fixpix
            musl: true
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: fixpix-windows-x86_64.zip
            binary: fixpix.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin fixpix

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/package/
          cp README.md LICENSE dist/package/
          tar -czf dist/${{ matrix.archive }} -C dist/package .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/package/
          Copy-Item README.md, LICENSE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath dist/${{ matrix.archive }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "$TAG_NAME" \
              --notes "Release $TAG_NAME"
          fi
